name: rideon
description: RideOn - Car Pooling App
version: 1.0.4+4

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  timeago: ^3.7.0
  intl: 0.20.2
  lottie: ^3.1.2

  # Notifications
  onesignal_flutter: ^5.2.5

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  http: ^1.2.1
  pinput: ^6.0.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.0
  flutter_dotenv: ^6.0.0
  package_info_plus: ^9.0.1
  flutter_map_cancellable_tile_provider: ^3.0.2
  flutter_map_cache: ^2.0.0+1


dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
    - assets/lottie/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ride_together_icon.png"
  min_sdk_api: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/ride_together_icon.png"
